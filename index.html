<!DOCTYPE html>
<html>
<style>
	body {
		background-image: url('assets/chaim-vester/portraits-spritesheet.png');
		background-size: 100%;
		background-position: 0 0;
	}
	button {
		position: absolute;
		top: 40%;
		left: 33vw;
		width: 33vw;
		height: 20vh;
		font: sans-serif;
		font-size: 4em;
		font-weight: bold;
		background-color: teal;
		color: white;
		box-shadow: 0px 5px 5px blue;
	}
	button:hover {
		box-shadow: 0px 3px 3px blue;
	}
	html {
		justify-items: center;
		align-items: center;
		display: grid;

<body>
<script type="module">
import init from "./pkg/mikumikutower.js";
async function go() {
	await init();
	console.log("loaded");
	const btn = document.getElementById("button");
	btn.remove(btn);
}
window.go = go;
</script>
<button id="button" onclick="window.go()">Click to start game</button>
